<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Task Manager API</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <h1>Task Manager API</h1>
        
        <div id="authSection">
            <input type="user" id="userInput" placeholder="Usuario">
            <input type="password" id="passInput" placeholder="Contrasena">
            <button id="loginBtn">Ingresar</button>
        </div>

        <div id="mainApp" style="display: none;">
            <div class="task-input">
                <input type="text" id="taskInput" placeholder="Escribe una nueva tarea">
                <button id="addBtn">Agregar</button>
            </div>
            <p id="emptyMessage">No hay tareas pendientes.</p>
            <ul id="taskList"></ul>
            <div class="auth-footer">
                <button id="logoutBtn">Cerrar Sesión</button>
            </div>
    </div>
    <p id="statusMessage"></p>

    <script src="script.js"></script>
</body>
</html>
